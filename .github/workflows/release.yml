name: release

# One repo, five packages. A tag says which one goes out and at which
# version: `solidsight-v0.11.6`, `pcbsight-v0.5.1`, ...
#
# No API token lives anywhere: PyPI trusted publishing (OIDC) checks that
# the release really came from this repo, this workflow file and this
# GitHub environment. PyPI refuses two publishers with the same
# repo+workflow+environment, so each package publishes from its own
# environment: pypi-solidsight, pypi-animationsight, ...
# NOTE: push tags in batches of three or fewer. GitHub Actions silently
# creates no events at all for a push carrying more than three tags, so a
# `git push origin a b c d e` looks like it worked and releases nothing.
on:
  push:
    tags: ['*-v*']

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      pkg: ${{ steps.tag.outputs.pkg }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read the package and version out of the tag
        id: tag
        run: |
          pkg="${GITHUB_REF_NAME%-v*}"
          ver="${GITHUB_REF_NAME##*-v}"
          test -f "$pkg/pyproject.toml" || {
            echo "::error::no package named '$pkg' in this repo"; exit 1; }
          # a tag that disagrees with the file would publish the wrong thing
          grep -qx "version = \"$ver\"" "$pkg/pyproject.toml" || {
            echo "::error::tag says $ver, $pkg/pyproject.toml says $(
              grep -m1 '^version = ' "$pkg/pyproject.toml")"; exit 1; }
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      - name: Tests must pass before anything is published
        run: |
          pip install -e "./${{ steps.tag.outputs.pkg }}" pytest
          (cd "${{ steps.tag.outputs.pkg }}" && python -m pytest tests -q)

  publish:
    needs: check
    runs-on: ubuntu-latest
    environment: pypi-${{ needs.check.outputs.pkg }}
    permissions:
      id-token: write        # this is what trusted publishing signs with
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build && python -m build "${{ needs.check.outputs.pkg }}"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ needs.check.outputs.pkg }}/dist
